name: Release

on:
  push:
    branches: [main]
    # Only build/release when the push touches buildable source — mirrors the
    # source predicate the git hooks use (cmd/server|internal/|web/|Dockerfile|
    # go.mod/sum). A docs/tooling-only push skips the workflow entirely; the
    # version is unchanged on those, so the tag step would no-op anyway.
    paths:
      - 'cmd/server/**'
      - 'internal/**'
      - 'web/**'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push tags
      packages: write   # push to ghcr.io

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to push tags

      - name: Extract version
        id: ver
        run: |
          VERSION=$(grep -oP '(?<=Version = ")\d+\.\d+\.\d+' internal/config/config.go)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Tag if new
        run: |
          TAG=${{ steps.ver.outputs.tag }}
          if git ls-remote --tags origin "$TAG" | grep -q .; then
            echo "Tag $TAG already exists, skipping."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tagged $TAG"
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
