<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Snug</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- LOGIN -->
  <section data-view="login" class="centered" hidden>
    <div class="card">
      <h1 class="brand">snug</h1>
      <p class="tagline">the small private room</p>
      <form id="login-form" autocomplete="on">
        <label>Username
          <input id="login-username" name="username" autocomplete="username" autofocus required>
        </label>
        <label>Password
          <input id="login-password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="primary">Sign in</button>
        <p id="login-error" class="error" role="alert"></p>
      </form>
    </div>
  </section>

  <!-- SET PASSWORD -->
  <section data-view="set-password" class="centered" hidden>
    <div class="card">
      <h1 class="brand">snug</h1>
      <p id="sp-intro" class="tagline">Set your password.</p>
      <form id="sp-form">
        <label>New password
          <input id="sp-password" type="password" autocomplete="new-password" minlength="10" required>
        </label>
        <label>Confirm password
          <input id="sp-password2" type="password" autocomplete="new-password" minlength="10" required>
        </label>
        <button type="submit" class="primary">Set password</button>
        <p id="sp-error" class="error" role="alert"></p>
      </form>
    </div>
  </section>

  <!-- APP -->
  <section data-view="app" class="app" hidden>
    <aside class="sidebar">
      <header class="sidebar-head">
        <span class="brand small">snug</span>
        <span id="conn-status" class="conn offline" title="Reconnecting…"></span>
      </header>

      <div class="channels-head">
        <span class="section-label">Channels</span>
        <button id="new-channel-btn" class="icon-btn" title="New channel" hidden>+</button>
      </div>
      <ul id="channel-list" class="channel-list"></ul>

      <div class="sidebar-foot">
        <div id="me-avatar" class="avatar me-avatar"></div>
        <div class="me-meta">
          <div id="me-name" class="me-name"></div>
          <div id="me-status-text" class="me-status-text" title="Click to set status text"></div>
        </div>
        <select id="status-select" class="status-select" title="Presence">
          <option value="online">online</option>
          <option value="away">away</option>
          <option value="dnd">do not disturb</option>
          <option value="offline">invisible</option>
        </select>
      </div>
      <div class="sidebar-actions">
        <label class="link" title="Upload avatar">avatar<input id="avatar-input" type="file" accept="image/png,image/jpeg,image/webp,image/gif" hidden></label>
        <button id="admin-btn" class="link" hidden>admin</button>
        <button id="logout-btn" class="link">sign out</button>
      </div>
    </aside>

    <main class="main">
      <header class="channel-header">
        <div>
          <span id="channel-title" class="channel-title"></span>
          <span id="channel-topic" class="channel-topic"></span>
        </div>
      </header>
      <div id="message-list" class="message-list"></div>
      <div class="composer">
        <textarea id="composer-input" rows="1" placeholder="Message… (Enter to send, Shift+Enter for newline)"></textarea>
      </div>
    </main>

    <aside class="members">
      <span class="section-label">Members</span>
      <ul id="member-list" class="member-list"></ul>
    </aside>
  </section>

  <!-- ADMIN MODAL -->
  <div id="admin-modal" class="modal" hidden>
    <div class="modal-card">
      <header class="modal-head">
        <h2>Admin</h2>
        <button id="admin-close" class="icon-btn">×</button>
      </header>

      <h3>Create user</h3>
      <form id="admin-create-form" class="admin-create">
        <input id="admin-new-username" placeholder="username" required>
        <input id="admin-new-display" placeholder="display name">
        <select id="admin-new-role">
          <option value="member">member</option>
          <option value="moderator">moderator</option>
          <option value="admin">admin</option>
        </select>
        <button type="submit" class="primary">Create + link</button>
      </form>
      <div id="admin-create-out" class="admin-out"></div>

      <h3>Users</h3>
      <table class="admin-table">
        <thead>
          <tr><th>username</th><th>name</th><th>role</th><th>pw</th><th>state</th><th>actions</th></tr>
        </thead>
        <tbody id="admin-user-rows"></tbody>
      </table>
    </div>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
